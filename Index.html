<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Welcome Ammu ❤️</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    /* ── Reset & Base ───────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --purple:  #9b5de5;
      --pink:    #f15bb5;
      --blue:    #00bbf9;
      --teal:    #00f5d4;
      --bg:      #0a0010;
      --glass:   rgba(255,255,255,0.05);
      --border:  rgba(255,255,255,0.12);
    }

    html, body {
      height: 100%;
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: #fff;
      overflow: hidden;
    }

    /* ── Starfield Canvas ───────────────────────────────── */
    #starfield {
      position: fixed; inset: 0; z-index: 0;
      pointer-events: none;
    }

    /* ── Floating Orbs ──────────────────────────────────── */
    .orb {
      position: fixed; border-radius: 50%;
      filter: blur(80px); opacity: .35;
      pointer-events: none; z-index: 0;
      animation: drift 18s ease-in-out infinite alternate;
    }
    .orb-1 { width:420px; height:420px; background:var(--purple); top:-120px; left:-80px; animation-delay:0s; }
    .orb-2 { width:340px; height:340px; background:var(--pink);   bottom:-100px; right:-60px; animation-delay:-6s; }
    .orb-3 { width:260px; height:260px; background:var(--blue);   top:50%; left:60%; animation-delay:-12s; }

    @keyframes drift {
      from { transform: translate(0,0) scale(1); }
      to   { transform: translate(40px, 30px) scale(1.08); }
    }

    /* ── Pages ──────────────────────────────────────────── */
    .page {
      position: fixed; inset: 0; z-index: 10;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 24px;
      transition: opacity .7s ease, transform .7s ease;
    }
    .page.hidden {
      opacity: 0; pointer-events: none;
      transform: translateY(40px);
    }

    /* ── PAGE 1 – Welcome ───────────────────────────────── */
    #page1 .welcome-card {
      background: var(--glass);
      border: 1px solid var(--border);
      backdrop-filter: blur(24px);
      border-radius: 28px;
      padding: 56px 48px;
      text-align: center;
      max-width: 520px; width: 100%;
      position: relative;
      box-shadow: 0 0 60px rgba(155,93,229,.18), 0 0 120px rgba(241,91,181,.08);
    }

    .emoji-float {
      font-size: 3rem;
      animation: floatBounce 3s ease-in-out infinite;
      display: block; margin-bottom: 12px;
    }
    @keyframes floatBounce {
      0%,100% { transform: translateY(0) rotate(-5deg); }
      50%      { transform: translateY(-14px) rotate(5deg); }
    }

    #page1 h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 7vw, 3.4rem);
      background: linear-gradient(135deg, #f15bb5, #9b5de5, #00bbf9);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.2; margin-bottom: 14px;
      animation: shimmer 4s linear infinite;
      background-size: 200%;
    }
    @keyframes shimmer {
      0%   { background-position: 0% 50%; }
      100% { background-position: 200% 50%; }
    }

    #page1 .subtitle {
      font-size: 1.05rem; color: rgba(255,255,255,.65);
      margin-bottom: 36px; line-height: 1.5;
      font-style: italic;
    }

    /* ── Glowing Button ─────────────────────────────────── */
    .btn-glow {
      position: relative;
      padding: 14px 44px;
      border: none; border-radius: 50px;
      font-family: 'DM Sans', sans-serif;
      font-size: 1.05rem; font-weight: 500;
      cursor: pointer; letter-spacing: .5px;
      color: #fff;
      background: linear-gradient(135deg, var(--purple), var(--pink));
      box-shadow: 0 0 20px rgba(241,91,181,.45), 0 0 40px rgba(155,93,229,.25);
      transition: transform .2s, box-shadow .2s;
      overflow: hidden;
    }
    .btn-glow::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,.15), transparent);
      border-radius: inherit;
    }
    .btn-glow:hover {
      transform: translateY(-3px) scale(1.04);
      box-shadow: 0 0 36px rgba(241,91,181,.65), 0 0 70px rgba(155,93,229,.35);
    }
    .btn-glow:active { transform: scale(.97); }

    /* ── Music Toggle ───────────────────────────────────── */
    #musicBtn {
      position: fixed; top: 20px; right: 20px; z-index: 100;
      background: var(--glass); border: 1px solid var(--border);
      backdrop-filter: blur(12px);
      border-radius: 50%; width: 46px; height: 46px;
      font-size: 1.2rem; cursor: pointer; color: #fff;
      display: flex; align-items: center; justify-content: center;
      transition: transform .2s, box-shadow .2s;
      box-shadow: 0 0 12px rgba(155,93,229,.3);
    }
    #musicBtn:hover { transform: scale(1.1); box-shadow: 0 0 22px rgba(241,91,181,.5); }

    /* ── PAGE 2 – Message ───────────────────────────────── */
    #page2 .msg-card {
      background: var(--glass);
      border: 1px solid var(--border);
      backdrop-filter: blur(28px);
      border-radius: 28px;
      padding: 48px 44px;
      max-width: 580px; width: 100%;
      text-align: center;
      box-shadow: 0 0 80px rgba(0,187,249,.1), 0 0 140px rgba(155,93,229,.08);
    }

    #page2 .msg-icon { font-size: 2.4rem; margin-bottom: 18px; display: block; }

    #page2 .msg-text {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1rem, 2.8vw, 1.2rem);
      line-height: 1.85;
      color: rgba(255,255,255,.9);
      margin-bottom: 36px;
      font-style: italic;
    }
    #page2 .msg-text span { /* each word fades in */
      opacity: 0;
      animation: wordFadeIn .4s forwards;
    }
    @keyframes wordFadeIn {
      to { opacity: 1; }
    }

    .btn-row {
      display: flex; gap: 14px; justify-content: center; flex-wrap: wrap;
    }

    /* ── OK Button ─────────────────────────────────────── */
    #btnOk {
      background: linear-gradient(135deg, #00f5d4, #00bbf9);
      box-shadow: 0 0 20px rgba(0,245,212,.35), 0 0 40px rgba(0,187,249,.2);
    }
    #btnOk:hover { box-shadow: 0 0 36px rgba(0,245,212,.6), 0 0 70px rgba(0,187,249,.35); }

    /* ── No Button ─────────────────────────────────────── */
    #btnNo {
      background: linear-gradient(135deg, #f15bb5, #ff6b6b);
      box-shadow: 0 0 20px rgba(241,91,181,.35);
      position: fixed; /* freed from flow for escape trick */
      /* initial layout position set by JS */
    }
    #btnNo.in-flow {
      position: relative !important;
      transform: none !important;
    }

    /* ── PAGE 3 – Success ───────────────────────────────── */
    #page3 .success-card {
      background: var(--glass);
      border: 1px solid var(--border);
      backdrop-filter: blur(28px);
      border-radius: 28px;
      padding: 56px 44px;
      max-width: 480px; width: 100%;
      text-align: center;
      box-shadow: 0 0 80px rgba(0,245,212,.12), 0 0 140px rgba(241,91,181,.1);
    }
    #page3 h2 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.6rem, 6vw, 2.6rem);
      background: linear-gradient(135deg, #f15bb5, #9b5de5, #00f5d4);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
      margin: 16px 0 12px;
    }
    #page3 p { font-size: 1.1rem; color: rgba(255,255,255,.7); }
    #page3 .big-heart {
      font-size: 4rem;
      display: block;
      animation: heartPop 1s cubic-bezier(.36,.07,.19,.97) both;
    }
    @keyframes heartPop {
      0%   { transform: scale(0) rotate(-20deg); opacity: 0; }
      60%  { transform: scale(1.3) rotate(5deg); }
      100% { transform: scale(1) rotate(0deg); opacity: 1; }
    }

    /* ── Confetti ───────────────────────────────────────── */
    .confetti-piece {
      position: fixed; width: 10px; height: 10px;
      border-radius: 2px;
      top: -20px; pointer-events: none; z-index: 200;
      animation: confettiFall linear forwards;
    }
    @keyframes confettiFall {
      to { transform: translateY(110vh) rotate(720deg); opacity: 0; }
    }

    /* ── Floating Hearts ────────────────────────────────── */
    .heart-float {
      position: fixed; font-size: 1.6rem;
      pointer-events: none; z-index: 200;
      animation: heartRise 3s ease-out forwards;
    }
    @keyframes heartRise {
      0%   { transform: translateY(0) scale(.6); opacity: 1; }
      100% { transform: translateY(-70vh) scale(1.2); opacity: 0; }
    }

    /* ── Attempt Warning ────────────────────────────────── */
    #pleaseMsg {
      position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
      background: linear-gradient(135deg, rgba(241,91,181,.25), rgba(155,93,229,.25));
      border: 1px solid rgba(241,91,181,.4);
      backdrop-filter: blur(14px);
      border-radius: 16px; padding: 14px 28px;
      font-size: 1rem; color: #fff; z-index: 300;
      text-align: center; max-width: 340px; width: 90%;
      opacity: 0; pointer-events: none;
      transition: opacity .4s;
    }
    #pleaseMsg.show { opacity: 1; }

    /* ── Responsive ─────────────────────────────────────── */
    @media (max-width: 480px) {
      #page1 .welcome-card, #page2 .msg-card, #page3 .success-card {
        padding: 36px 24px;
      }
      .btn-glow { padding: 13px 32px; font-size: .95rem; }
    }
  </style>
</head>
<body>

<!-- Background Elements -->
<canvas id="starfield"></canvas>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>

<!-- Music Toggle -->
<button id="musicBtn" title="Toggle Music">🎵</button>

<!-- ───── PAGE 1 – Welcome ───── -->
<div class="page" id="page1">
  <div class="welcome-card">
    <span class="emoji-float">💖</span>
    <h1>Welcome Ammu ❤️</h1>
    <p class="subtitle">"A small game before you get mad 😏<br>…or maybe you already are? 👀"</p>
    <button class="btn-glow" id="startBtn">Let's Play ✨</button>
  </div>
</div>

<!-- ───── PAGE 2 – Message ───── -->
<div class="page hidden" id="page2">
  <div class="msg-card">
    <span class="msg-icon">💌</span>
    <p class="msg-text" id="msgText"></p>
    <div class="btn-row">
      <button class="btn-glow" id="btnOk">Ok fine 😊</button>
      <button class="btn-glow" id="btnNo" style="position:relative;">No I'm not ok 😤</button>
    </div>
  </div>
</div>

<!-- ───── PAGE 3 – Success ───── -->
<div class="page hidden" id="page3">
  <div class="success-card">
    <span class="big-heart">💗</span>
    <h2>Yayyy 😍</h2>
    <p>I knew you couldn't stay mad!<br>You're literally the best ✨</p>
  </div>
</div>

<!-- Please Message -->
<div id="pleaseMsg">Ammu please 😭 don't do like this...<br>try again!</div>

<!-- Audio (royalty-free sine-wave generated in JS as fallback) -->
<audio id="bgMusic" loop>
  <!-- We'll generate music with Web Audio API instead -->
</audio>

<script>
/* ══════════════════════════════════════════════════
   STARFIELD
══════════════════════════════════════════════════ */
(function () {
  const canvas = document.getElementById('starfield');
  const ctx = canvas.getContext('2d');
  let stars = [];

  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  for (let i = 0; i < 120; i++) {
    stars.push({
      x: Math.random() * window.innerWidth,
      y: Math.random() * window.innerHeight,
      r: Math.random() * 1.4 + .3,
      a: Math.random(),
      speed: Math.random() * .008 + .003,
      dir: Math.random() > .5 ? 1 : -1
    });
  }

  function drawStars() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    stars.forEach(s => {
      s.a += s.speed * s.dir;
      if (s.a <= 0 || s.a >= 1) s.dir *= -1;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255,255,255,${s.a})`;
      ctx.fill();
    });
    requestAnimationFrame(drawStars);
  }
  drawStars();
})();

/* ══════════════════════════════════════════════════
   WEB AUDIO – soft ambient pad
══════════════════════════════════════════════════ */
let audioCtx, gainNode, musicPlaying = false, musicStarted = false;

function startMusic() {
  if (musicStarted) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  gainNode = audioCtx.createGain();
  gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
  gainNode.gain.linearRampToValueAtTime(0.08, audioCtx.currentTime + 2);
  gainNode.connect(audioCtx.destination);

  // Soft chord: root, major third, fifth, octave  (Cmaj: 261.6, 329.6, 392, 523.2)
  const freqs = [261.6, 329.6, 392, 523.2, 196, 164.8];
  freqs.forEach((f, i) => {
    const osc = audioCtx.createOscillator();
    const oscGain = audioCtx.createGain();
    osc.type = i < 4 ? 'sine' : 'triangle';
    osc.frequency.value = f;
    oscGain.gain.value = i < 4 ? 0.22 : 0.1;
    osc.connect(oscGain).connect(gainNode);
    osc.start();
  });
  musicStarted = true;
  musicPlaying = true;
}

function toggleMusic() {
  if (!musicStarted) { startMusic(); return; }
  if (musicPlaying) {
    gainNode.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 1);
    musicPlaying = false;
    document.getElementById('musicBtn').textContent = '🔇';
  } else {
    gainNode.gain.linearRampToValueAtTime(0.08, audioCtx.currentTime + 1);
    musicPlaying = true;
    document.getElementById('musicBtn').textContent = '🎵';
  }
}

document.getElementById('musicBtn').addEventListener('click', toggleMusic);

/* ── Click SFX ───────────────────────────── */
function playClick(happy = true) {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  osc.type = 'sine';
  osc.frequency.value = happy ? 880 : 220;
  g.gain.setValueAtTime(0.15, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.25);
  osc.connect(g).connect(gainNode || audioCtx.destination);
  osc.start(); osc.stop(audioCtx.currentTime + 0.25);
}

/* ══════════════════════════════════════════════════
   PAGE TRANSITIONS
══════════════════════════════════════════════════ */
function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
  setTimeout(() => {
    document.getElementById(id).classList.remove('hidden');
  }, 50);
}

/* ══════════════════════════════════════════════════
   PAGE 1 – START
══════════════════════════════════════════════════ */
document.getElementById('startBtn').addEventListener('click', () => {
  startMusic();
  playClick(true);
  showPage('page2');
  setTimeout(animateMessage, 600);
});

/* ══════════════════════════════════════════════════
   PAGE 2 – ANIMATED MESSAGE TEXT
══════════════════════════════════════════════════ */
const MESSAGE = "Hey… I didn't like how our conversation ended. It didn't feel right. I might have sounded off, but hurting you was never my intention. I don't like this distance between us… can we just reset? I like us better when you're smiling. 💕";

function animateMessage() {
  const el = document.getElementById('msgText');
  el.innerHTML = '';
  const words = MESSAGE.split(' ');
  words.forEach((w, i) => {
    const span = document.createElement('span');
    span.textContent = w + ' ';
    span.style.animationDelay = `${i * 0.07}s`;
    el.appendChild(span);
  });
  // Position btnNo after layout settles
  setTimeout(positionBtnNo, 200);
}

/* ══════════════════════════════════════════════════
   PAGE 2 – BUTTON LOGIC
══════════════════════════════════════════════════ */
let noAttempts = 0;
let btnNoEscaping = false;

const btnNo = document.getElementById('btnNo');
const pleaseMsg = document.getElementById('pleaseMsg');

// Make btnNo absolutely positioned from the start
function positionBtnNo() {
  const rect = btnNo.getBoundingClientRect();
  btnNo.style.position = 'fixed';
  btnNo.style.left = rect.left + 'px';
  btnNo.style.top  = rect.top  + 'px';
  btnNo.style.width  = rect.width  + 'px';
  btnNo.style.height = rect.height + 'px';
}

btnNo.addEventListener('mouseover', escapeBtnNo);
btnNo.addEventListener('touchstart', escapeBtnNo, { passive: true });

function escapeBtnNo() {
  if (noAttempts >= 3) return;
  noAttempts++;
  playClick(false);

  if (noAttempts >= 3) {
    showPleaseMsg();
    return;
  }

  const margin = 60;
  const maxX = window.innerWidth  - btnNo.offsetWidth  - margin;
  const maxY = window.innerHeight - btnNo.offsetHeight - margin;
  const newX = Math.random() * (maxX - margin) + margin;
  const newY = Math.random() * (maxY - margin) + margin;

  btnNo.style.transition = 'left .18s cubic-bezier(.36,.07,.19,.97), top .18s cubic-bezier(.36,.07,.19,.97)';
  btnNo.style.left = newX + 'px';
  btnNo.style.top  = newY + 'px';
}

function showPleaseMsg() {
  btnNo.style.display = 'none';
  pleaseMsg.classList.add('show');
  setTimeout(() => {
    pleaseMsg.classList.remove('show');
    noAttempts = 0;
    btnNo.style.display = '';
    positionBtnNo();
  }, 3500);
}

// OK button
document.getElementById('btnOk').addEventListener('click', () => {
  startMusic();
  playClick(true);
  showPage('page3');
  setTimeout(() => {
    launchConfetti();
    launchHearts();
  }, 400);
});

/* ══════════════════════════════════════════════════
   SUCCESS – CONFETTI + HEARTS
══════════════════════════════════════════════════ */
const CONFETTI_COLORS = ['#f15bb5','#9b5de5','#00bbf9','#00f5d4','#ffe74c','#ff6b6b'];

function launchConfetti() {
  for (let i = 0; i < 90; i++) {
    setTimeout(() => {
      const el = document.createElement('div');
      el.className = 'confetti-piece';
      el.style.left  = Math.random() * 100 + 'vw';
      el.style.background = CONFETTI_COLORS[Math.floor(Math.random() * CONFETTI_COLORS.length)];
      el.style.width  = (Math.random() * 8 + 6) + 'px';
      el.style.height = (Math.random() * 8 + 6) + 'px';
      el.style.borderRadius = Math.random() > .5 ? '50%' : '2px';
      const dur = (Math.random() * 2 + 2).toFixed(2);
      el.style.animationDuration = dur + 's';
      el.style.animationDelay = (Math.random() * .5) + 's';
      document.body.appendChild(el);
      setTimeout(() => el.remove(), (parseFloat(dur) + 1) * 1000);
    }, i * 30);
  }
}

function launchHearts() {
  const hearts = ['❤️','💖','💗','💕','💓','💞','🌸'];
  for (let i = 0; i < 18; i++) {
    setTimeout(() => {
      const el = document.createElement('div');
      el.className = 'heart-float';
      el.textContent = hearts[Math.floor(Math.random() * hearts.length)];
      el.style.left = (Math.random() * 90 + 5) + 'vw';
      el.style.bottom = '0';
      el.style.fontSize = (Math.random() * 1.4 + 1) + 'rem';
      const dur = (Math.random() * 1.5 + 2.5).toFixed(2);
      el.style.animationDuration = dur + 's';
      document.body.appendChild(el);
      setTimeout(() => el.remove(), parseFloat(dur) * 1000 + 500);
    }, i * 180);
  }
}
</script>
</body>
</html>
